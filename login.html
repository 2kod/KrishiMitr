<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - कृषिMitr</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    .login-section { padding-top: 150px; padding-bottom: 100px; background-color: var(--cultured); min-height: 100vh; }
    .login-card { max-width: 500px; margin: 0 auto; background-color: var(--white); border-radius: var(--radius-10); box-shadow: var(--shadow-1); padding: 40px; }
    .login-card .h2 { text-align: center; font-family: var(--ff-playfair); font-size: var(--fs-2); color: var(--black-chocolate); margin-bottom: 10px; }
    .login-card .form-subtitle { text-align: center; font-size: var(--fs-5); color: var(--davys-gray); margin-bottom: 30px; }
    .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 25px; }
    .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: 600; color: #777; transition: 0.3s; }
    .auth-tab:hover { color: #1e7e34; background: #f9f9f9; }
    .auth-tab.active { color: #1e7e34; border-bottom: 3px solid #1e7e34; background: transparent; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: var(--fw-600); font-size: var(--fs-6); color: var(--black-chocolate); margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 12px 15px; font-size: var(--fs-5); border: 1px solid var(--light-gray); border-radius: var(--radius-10); transition: var(--transition-1); font-family: 'Montserrat', sans-serif; }
    .form-group input:focus { border-color: var(--blue-green-color-wheel); box-shadow: 0 0 0 3px var(--blue-green-color-wheel_10); }
    .forgot-link { display: block; text-align: right; font-size: var(--fs-6); color: var(--blue-green-color-wheel); font-weight: var(--fw-500); margin-top: -10px; margin-bottom: 25px; }
    .forgot-link:hover { text-decoration: underline; }
    .signup-link { text-align: center; margin-top: 30px; font-size: var(--fs-5); }
    .signup-link a { display: inline; color: var(--blue-green-color-wheel); font-weight: var(--fw-600); }
    .signup-link a:hover { text-decoration: underline; }
    #otp-group { display: none; animation: fadeIn 0.5s; }
    #recaptcha-container { margin-bottom: 15px; display: flex; justify-content: center; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body id="top">
  <div id="header-placeholder"></div>
  <main>
    <article>
      <section class="section login-section" aria-label="login form" data-section>
        <div class="container">
          <div class="login-card">
            <h2 class="h2">Farmer Login</h2>
            <p class="form-subtitle">Welcome back! Sign in to your dashboard.</p>
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('email')">Email Login</div>
                <div class="auth-tab" onclick="switchTab('phone')">Phone Login</div>
            </div>
            <form action="#" class="login-form" id="email-login-form">
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Enter your email" required>
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
              </div>
              <a href="#" class="forgot-link">Forgot Password?</a>
              <button type="submit" class="btn btn-primary" style="width: 100%;">Login with Email</button>
            </form>
            <form action="#" class="login-form" id="phone-login-form" style="display: none;">
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone" value="+91 " placeholder="98765 43210" required>
              </div>
              <div id="recaptcha-container"></div> 
              <button type="button" id="send-otp-btn" class="btn btn-secondary" style="width: 100%; margin-bottom: 15px;">Send OTP</button>
              <div class="form-group" id="otp-group">
                <label for="otp">Enter OTP</label>
                <input type="number" name="otp" id="otp" placeholder="123456">
                <button type="submit" id="verify-otp-btn" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Verify OTP & Login</button>
              </div>
            </form>
            <p class="signup-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
          </div>
        </div>
      </section>
    </article>
  </main>
  <div id="footer-placeholder"></div>
  <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn><ion-icon name="chevron-up" aria-hidden="true"></ion-icon></a>
  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/script.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script>
    function changeLanguage(lang) { console.log("Language changed to: " + lang); }
    window.switchTab = function(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.auth-tab[onclick="switchTab('${type}')"]`).classList.add('active');
        if (type === 'email') {
            document.getElementById('email-login-form').style.display = 'block';
            document.getElementById('phone-login-form').style.display = 'none';
        } else {
            document.getElementById('email-login-form').style.display = 'none';
            document.getElementById('phone-login-form').style.display = 'block';
            if (!window.recaptchaVerifier) document.dispatchEvent(new Event('initRecaptcha'));
        }
    }
  </script>
  <script type="module">
    import { signInWithEmailAndPassword, onAuthStateChanged, signOut, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { app, auth, db, analytics } from "./assets/js/config.js"; 
    window.confirmationResult = null; 
    document.addEventListener('initRecaptcha', () => {
        if (window.recaptchaVerifier) {
            try { window.recaptchaVerifier.clear(); } catch(e) {}
            window.recaptchaVerifier = null;
        }
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'invisible', 
            'callback': (response) => { console.log("Recaptcha Verified"); }
        });
    });
    const emailForm = document.getElementById('email-login-form');
    if (emailForm) { 
        emailForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'dashboard.html'; 
        } catch (error) {
            alert('Login Failed: ' + error.message);
        }
        });
    }
    const sendOtpBtn = document.getElementById('send-otp-btn');
    if (sendOtpBtn) {
        sendOtpBtn.addEventListener('click', async () => {
            let phoneNumber = document.getElementById('phone').value.trim();
            if (!phoneNumber.startsWith('+') && phoneNumber.length === 10) phoneNumber = "+91" + phoneNumber;
            if (!phoneNumber || phoneNumber.length < 13) { alert("Please enter a valid phone number (e.g. +91...)"); return; }
            const container = document.getElementById('recaptcha-container');
            container.innerHTML = ""; 
            if (window.recaptchaVerifier) {
                window.recaptchaVerifier.clear();
                window.recaptchaVerifier = null;
            }
            window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'invisible',
                'callback': (response) => { console.log("Recaptcha Verified"); }
            });
            sendOtpBtn.innerText = "Sending...";
            sendOtpBtn.disabled = true;
            try {
                const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);
                window.confirmationResult = confirmationResult;
                alert("OTP Sent to " + phoneNumber);
                document.getElementById('otp-group').style.display = 'block';
                sendOtpBtn.style.display = 'none';
            } catch (error) {
                alert("SMS Failed: " + error.message);
                sendOtpBtn.innerText = "Send OTP";
                sendOtpBtn.disabled = false;
            }
        });
    }
    const phoneForm = document.getElementById('phone-login-form');
    if (phoneForm) {
        phoneForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('otp').value;
            const verifyBtn = document.getElementById('verify-otp-btn');
            if(!code) return;
            verifyBtn.innerText = "Verifying...";
            try {
                const result = await window.confirmationResult.confirm(code);
                const user = result.user;
                await setDoc(doc(db, "farmers", user.uid), { phone: user.phoneNumber, lastLogin: new Date() }, { merge: true });
                alert("Login Successful!");
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert("Login Failed: " + error.message);
                verifyBtn.innerText = "Verify OTP & Login";
            }
        });
    }
    document.addEventListener('headerLoaded', () => {
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    authContainer.innerHTML = `<a href="dashboard.html" class="nav-profile-btn" title="Go to Dashboard"><ion-icon name="person-circle-outline"></ion-icon></a>`;
                } else {
                    authContainer.innerHTML = `<a href="signup.html" class="btn btn-primary" id="auth-button">Sign Up</a>`;
                }
            });
        }
    });
  </script>
</body>
</html>
