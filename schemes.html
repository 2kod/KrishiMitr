<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Government Schemes - कृषिMitra</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* --- PAGE SPECIFIC STYLES --- */
    .page-banner { padding: 60px 0 80px; text-align: center; background: linear-gradient(to bottom, #f0fdf4, #ffffff); }
    .page-banner .h1 { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 3rem; margin-bottom: 10px; }
    .page-banner .p { font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #666; line-height: 1.6; }

    .filter-wrapper { max-width: 900px; margin: -40px auto 40px; padding: 0 20px; position: relative; z-index: 5; }
    .filter-box { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; gap: 10px; border: 1px solid #eee; flex-wrap: wrap; }
    .filter-select { flex: 1; border: none; background: #f8f9fa; padding: 15px; border-radius: 10px; font-weight: 600; color: #555; outline: none; font-size: 1rem; cursor: pointer; min-width: 200px; }
    
    .schemes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding-bottom: 80px; }
    .scheme-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; transition: 0.3s; display: flex; flex-direction: column; }
    .scheme-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); border-color: var(--primary-light); }
    
    .scheme-category { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; width: fit-content; text-transform: uppercase; letter-spacing: 0.5px;}
    .cat-finance { background: #e8f5e9; color: #1e7e34; }
    .cat-insurance { background: #e3f2fd; color: #1565c0; }
    .cat-equipment { background: #fff3e0; color: #e65100; }
    .cat-irrigation { background: #e0f7fa; color: #00838f; }
    .cat-subsidy { background: #f3e5f5; color: #006064; }

    .scheme-title { font-size: 1.3rem; font-weight: 700; color: #2d3436; margin-bottom: 10px; line-height: 1.3; }
    .scheme-desc { font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.5; flex-grow: 1; }
    
    .scheme-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f4f4f4; padding-top: 15px; }
    .deadline { font-size: 0.85rem; color: #d32f2f; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .btn-apply { background: var(--primary); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-apply:hover { background: var(--primary-dark); }

    /* Modal Styles */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .scheme-modal { background: white; width: 90%; max-width: 650px; max-height: 85vh; border-radius: 20px; overflow-y: auto; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .modal-header { background: var(--primary-light); padding: 30px; border-bottom: 1px solid #c8e6c9; position: sticky; top: 0; z-index: 10; }
    .modal-title { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); margin: 0 0 5px 0; line-height: 1.2; }
    .modal-subtitle { font-size: 0.95rem; color: #1e7e34; margin: 0; font-weight: 600; }
    .close-modal { position: absolute; top: 25px; right: 25px; font-size: 1.8rem; background: none; border: none; color: #333; cursor: pointer; }
    
    .modal-body { padding: 30px; }
    .detail-section { margin-bottom: 25px; }
    .detail-section h4 { font-size: 1.1rem; color: #2d3436; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
    .detail-section h4 ion-icon { color: var(--primary); font-size: 1.3rem; }
    
    .detail-list { list-style: none; padding: 0; margin: 0; }
    .detail-list li { position: relative; padding-left: 20px; margin-bottom: 10px; font-size: 0.95rem; color: #555; line-height: 1.5; }
    .detail-list li::before { content: '•'; position: absolute; left: 0; color: var(--primary); font-weight: bold; font-size: 1.2rem; line-height: 1; }
    
    .steps-list { list-style: none; padding: 0; counter-reset: step-counter; }
    .steps-list li { position: relative; padding-left: 35px; margin-bottom: 15px; font-size: 0.95rem; color: #444; line-height: 1.5; }
    .steps-list li::before { content: counter(step-counter); counter-increment: step-counter; position: absolute; left: 0; top: -2px; width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }

    .modal-footer { padding: 20px 30px; background: #f9f9f9; border-top: 1px solid #eee; text-align: right; position: sticky; bottom: 0; }
    .btn-official { background: var(--primary); color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
    .btn-official:hover { background: var(--primary-dark); }

    .loader-container { text-align: center; padding: 50px; grid-column: 1/-1; color: #666; font-size: 1.2rem; }

    @media (max-width: 992px) { 
        .filter-box { flex-direction: column; }
        .scheme-modal { width: 95%; max-height: 90vh; }
    }
  </style>
</head>
<body id="top">

  <div id="header-placeholder"></div>

  <main>
    <section class="section page-banner">
      <div class="container">
        <h1 class="h1">Active Government Schemes</h1>
        <p class="p">Discover financial aids, insurance, and subsidies available for farmers. Learn how to apply step-by-step.</p>
      </div>
    </section>

    <div class="filter-wrapper">
      <div class="filter-box">
        <select class="filter-select" id="state-filter" onchange="filterAndRender()">
            <option value="All">All States / Central Schemes</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Bihar">Bihar</option>
            <option value="Gujarat">Gujarat</option>
            <option value="Haryana">Haryana</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Maharashtra">Maharashtra</option>
            <option value="Odisha">Odisha</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Telangana">Telangana</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="West Bengal">West Bengal</option>
        </select>
        <select class="filter-select" id="category-filter" onchange="filterAndRender()">
            <option value="All">All Categories</option>
            <option value="Financial">Financial Support</option>
            <option value="Insurance">Crop Insurance</option>
            <option value="Equipment">Equipment & Tech</option>
            <option value="Irrigation">Irrigation</option>
            <option value="Subsidy">Fertilizer/Seed Subsidy</option>
        </select>
      </div>
    </div>

    <section class="section pt-0">
      <div class="container">
        <div class="schemes-grid" id="schemes-container"></div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="scheme-modal">
      <div class="scheme-modal">
          <button class="close-modal" onclick="closeModal()"><ion-icon name="close-circle-outline"></ion-icon></button>
          
          <div class="modal-header">
              <h2 class="modal-title" id="m-title">--</h2>
              <p class="modal-subtitle" id="m-dept">--</p>
          </div>
          
          <div class="modal-body">
              <div class="detail-section">
                  <h4><ion-icon name="star-outline"></ion-icon> Key Benefits</h4>
                  <ul class="detail-list" id="m-benefits"></ul>
              </div>
              <div class="detail-section">
                  <h4><ion-icon name="checkmark-circle-outline"></ion-icon> Eligibility Criteria</h4>
                  <ul class="detail-list" id="m-eligibility"></ul>
              </div>
              <div class="detail-section">
                  <h4><ion-icon name="document-text-outline"></ion-icon> Documents Required</h4>
                  <ul class="detail-list" id="m-docs"></ul>
              </div>
              <div class="detail-section">
                  <h4><ion-icon name="laptop-outline"></ion-icon> How to Apply (Step-by-Step)</h4>
                  <ul class="steps-list" id="m-steps"></ul>
              </div>
          </div>

          <div class="modal-footer">
              <a href="#" target="_blank" class="btn-official" id="m-link">Visit Official Portal <ion-icon name="open-outline"></ion-icon></a>
          </div>
      </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/script.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script>
    let globalSchemesData = [];

    async function fetchSchemesAPI() {
        const container = document.getElementById('schemes-container');
        container.innerHTML = `<div class="loader-container"><ion-icon name="sync-outline" class="spin" style="font-size:3rem; color:var(--primary); margin-bottom:10px;"></ion-icon><br>Fetching latest schemes from Government Portals...</div>`;

        const mockApiResponse = [
            {
                id: 1, title: "PM-Kisan Samman Nidhi", category: "Financial", catClass: "cat-finance", state: "All",
                dept: "Ministry of Agriculture & Farmers Welfare", desc: "Direct income support of ₹6,000 per year to all landholding farmer families across the country.",
                deadline: "Apply anytime", link: "https://pmkisan.gov.in/",
                benefits: ["₹6,000 per year transferred directly to bank accounts.", "Funds transferred in three equal installments of ₹2,000 each."],
                eligibility: ["Must be a landholding farmer family.", "Institutional landholders and taxpayers are excluded."],
                documents: ["Aadhaar Card", "Land Ownership Papers (Khatauni)", "Bank Account Details (Passbook)"],
                steps: ["Visit the official PM-Kisan portal.", "Click on 'New Farmer Registration'.", "Enter Aadhaar number and state.", "Submit form and save reference number."]
            },
            {
                id: 2, title: "Pradhan Mantri Fasal Bima Yojana", category: "Insurance", catClass: "cat-insurance", state: "All",
                dept: "Ministry of Agriculture", desc: "Comprehensive crop insurance scheme from pre-sowing to post-harvest losses.",
                deadline: "Kharif: 31st July | Rabi: 31st Dec", link: "https://pmfby.gov.in/",
                benefits: ["Financial support if crops fail due to natural calamities.", "Very low premium rates (2% Kharif, 1.5% Rabi)."],
                eligibility: ["All farmers growing notified crops in notified areas.", "Includes sharecroppers and tenant farmers."],
                documents: ["Aadhaar Card", "Land Records (Jamabandi)", "Sowing Certificate", "Canceled Cheque"],
                steps: ["Go to the PMFBY official website.", "Register using mobile number.", "Enter land details and calculate premium.", "Pay premium online."]
            },
            {
                id: 3, title: "PM KUSUM Yojana", category: "Equipment", catClass: "cat-equipment", state: "All",
                dept: "Ministry of New and Renewable Energy", desc: "Scheme for farmers for installation of solar pumps.",
                deadline: "Varies by State", link: "https://pmkusum.mnre.gov.in/",
                benefits: ["Up to 60% subsidy on standalone solar pumps.", "Reduces diesel costs for irrigation."],
                eligibility: ["Individual farmers, cooperatives, or panchayats.", "Must have a valid water source."],
                documents: ["Aadhaar Card", "Land Documents", "Declaration of Water Source"],
                steps: ["Visit State Renewable Energy portal.", "Fill application for Component B.", "Pay 10% farmer share online."]
            },
            {
                id: 4, title: "Kisan Credit Card (KCC)", category: "Financial", catClass: "cat-finance", state: "All",
                dept: "Reserve Bank of India & NABARD", desc: "Provides farmers with timely access to credit for agricultural expenses.",
                deadline: "Apply Anytime", link: "https://sbi.co.in/web/agri-rural/agriculture-banking/crop-loan/kisan-credit-card",
                benefits: ["Short-term credit limits for crop production.", "Low interest rates (approx 4% with prompt repayment)."],
                eligibility: ["All farmers, tenant farmers, and sharecroppers."],
                documents: ["Aadhaar/PAN", "Land ownership proof", "Passport size photos"],
                steps: ["Visit nearest bank branch with documents.", "Fill out the KCC application form.", "Bank inspects land records and sanctions card."]
            },
            {
                id: 5, title: "Rajiv Gandhi Krishak Sathi", category: "Financial", catClass: "cat-finance", state: "Rajasthan",
                dept: "Department of Agriculture, Rajasthan", desc: "Financial assistance in case of accident/death during agricultural activities.",
                deadline: "Apply within 6 months", link: "https://agriculture.rajasthan.gov.in/",
                benefits: ["Up to ₹2 Lakhs financial assistance for accidental death.", "Assistance for partial/permanent disability."],
                eligibility: ["Resident of Rajasthan.", "Engaged in agricultural work."],
                documents: ["Aadhaar Card", "FIR/Police Report", "Medical/Death Certificate"],
                steps: ["Obtain form from Krishi Upaj Mandi Samiti.", "Attach Police FIR and Medical certificates.", "Submit to Mandi Secretary."]
            },
            {
                id: 6, title: "Rythu Bandhu", category: "Financial", catClass: "cat-finance", state: "Telangana",
                dept: "Government of Telangana", desc: "Agriculture Investment Support Scheme to relieve farmers from debt burden.",
                deadline: "Before Kharif/Rabi seasons", link: "http://rythubandhu.telangana.gov.in/",
                benefits: ["₹5,000 per acre per season to support farm investment (seeds, fertilizers)."],
                eligibility: ["Must own farming land in Telangana.", "Pattadar passbook required."],
                documents: ["Pattadar Passbook", "Aadhaar Card", "Bank Account Details"],
                steps: ["Ensure land records are updated in Dharani portal.", "AEO verifies records.", "Funds directly transferred to bank account."]
            },
            {
                id: 7, title: "KALIA Scheme", category: "Financial", catClass: "cat-finance", state: "Odisha",
                dept: "Government of Odisha", desc: "Krushak Assistance for Livelihood and Income Augmentation.",
                deadline: "Ongoing", link: "https://kalia.odisha.gov.in/",
                benefits: ["₹25,000 per farm family over five seasons.", "Support for landless agricultural households."],
                eligibility: ["Small and marginal farmers of Odisha.", "Landless laborers."],
                documents: ["Aadhaar Card", "Ration Card", "Bank Passbook"],
                steps: ["Visit KALIA portal.", "Apply through online form.", "Gram Panchayat verifies details."]
            },
            {
                id: 8, title: "Pani Bachao Paisa Kamao", category: "Irrigation", catClass: "cat-irrigation", state: "Punjab",
                dept: "PSPCL, Punjab", desc: "Incentivizes farmers to save electricity and ground water.",
                deadline: "Ongoing", link: "https://pspcl.in/",
                benefits: ["Farmers get cash incentives for consuming less electricity than the fixed allocation."],
                eligibility: ["Farmers in Punjab with grid-connected tubewells."],
                documents: ["Electricity Bill", "Aadhaar Card", "Bank Details"],
                steps: ["Enroll voluntarily at local PSPCL office.", "A meter is installed on the tubewell.", "Saved units calculate cash reward."]
            }
        ];

        return new Promise(resolve => { setTimeout(() => { resolve(mockApiResponse); }, 800); });
    }

    window.filterAndRender = function() {
        const container = document.getElementById('schemes-container');
        const stateFilter = document.getElementById('state-filter').value;
        const catFilter = document.getElementById('category-filter').value;
        container.innerHTML = "";
        const filtered = globalSchemesData.filter(scheme => {
            const matchState = stateFilter === "All" || scheme.state === "All" || scheme.state === stateFilter;
            const matchCat = catFilter === "All" || scheme.category === catFilter;
            return matchState && matchCat;
        });

        if (filtered.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #666; font-size: 1.1rem; padding: 40px;'>No schemes found for the selected filters.</p>";
            return;
        }

        filtered.forEach(scheme => {
            const html = `
                <div class="scheme-card">
                    <span class="scheme-category ${scheme.catClass}">${scheme.category} | ${scheme.state}</span>
                    <h3 class="scheme-title">${scheme.title}</h3>
                    <p class="scheme-desc">${scheme.desc}</p>
                    <div class="scheme-footer">
                        <span class="deadline"><ion-icon name="time-outline"></ion-icon> ${scheme.deadline}</span>
                        <button class="btn-apply" onclick="openModal(${scheme.id})">Details</button>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    const modal = document.getElementById('scheme-modal');
    window.openModal = function(id) {
        const scheme = globalSchemesData.find(s => s.id === id);
        if(!scheme) return;
        document.getElementById('m-title').textContent = scheme.title;
        document.getElementById('m-dept').textContent = scheme.dept;
        document.getElementById('m-benefits').innerHTML = scheme.benefits.map(b => `<li>${b}</li>`).join('');
        document.getElementById('m-eligibility').innerHTML = scheme.eligibility.map(e => `<li>${e}</li>`).join('');
        document.getElementById('m-docs').innerHTML = scheme.documents.map(d => `<li>${d}</li>`).join('');
        document.getElementById('m-steps').innerHTML = scheme.steps.map(s => `<li>${s}</li>`).join('');
        document.getElementById('m-link').href = scheme.link;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; 
    }

    window.closeModal = function() {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    document.addEventListener('DOMContentLoaded', async () => {
        globalSchemesData = await fetchSchemesAPI();
        filterAndRender();
    });
  </script>

  <script type="module">
    import { auth } from "./assets/js/config.js"; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    document.addEventListener('headerLoaded', () => {
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
          onAuthStateChanged(auth, (user) => {
            if (user) {
              authContainer.innerHTML = `<a href="dashboard.html" class="nav-profile-btn" title="Dashboard"><ion-icon name="person-circle-outline"></ion-icon></a>`;
            } else {
              authContainer.innerHTML = `<a href="signup.html" class="btn btn-primary" id="auth-button">Sign Up</a>`;
            }
          });
        }
    });
  </script>

</body>
</html>
