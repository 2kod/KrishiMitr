<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign Up - कृषिMitra</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    /* --- SOOTHING INDIAN FARM BACKGROUND --- */
    body {
        background-image: linear-gradient(rgba(255, 255, 255, 0.8), rgba(240, 253, 244, 0.95)), url('./assets/images/image.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: 'Montserrat', sans-serif;
        margin: 0;
    }

    /* ALIGN LOGO TO LEFT */
    .auth-header { 
        padding: 20px 40px; 
        display: flex; 
        justify-content: flex-start; /* Aligns to left */
        align-items: center; 
    }
    .auth-header .logo { font-size: 3.5rem; font-weight: 700; color: var(--primary-dark); font-family: 'Playfair Display', serif; text-decoration: none; }
    .auth-header .logo span { color: #f39c12; }

    /* Frosted Glass Card */
    .login-section { padding-top: 10px; padding-bottom: 80px; min-height: calc(100vh - 100px); display: flex; align-items: center; justify-content: center; }
    .login-card { 
        width: 100%; max-width: 550px; margin: 0 auto; 
        background: rgba(255, 255, 255, 0.85); 
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); padding: 40px; 
    }
    
    .login-card .h2 { text-align: center; font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--primary-dark); margin-bottom: 10px; }
    .login-card .form-subtitle { text-align: center; font-size: 1.4rem; color: #555; margin-bottom: 30px; font-weight: 500; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 700; font-size: 1.3rem; color: #333; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 14px 15px; font-size: 1.4rem; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; transition: 0.3s; font-family: 'Montserrat', sans-serif; background: rgba(255,255,255,0.9); color: #333; }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(30, 126, 52, 0.1); outline: none; }
    
    .form-divider { margin: 30px 0; border: 0; border-top: 1px dashed rgba(0,0,0,0.2); }
    
    /* FORCE BUTTON VISIBILITY (FIXED) */
    .btn-auth { 
        background-color: #1e7e34 !important; /* Solid Green */
        color: #ffffff !important;           /* Pure White Text */
        border: none !important;
        padding: 15px !important;
        font-size: 1.6rem !important;
        font-weight: 700 !important;
        border-radius: 12px !important;
        width: 100% !important;
        cursor: pointer !important;
        transition: 0.3s !important;
        box-shadow: 0 4px 15px rgba(30, 126, 52, 0.3) !important;
        margin-top: 15px !important;
        display: block !important;
    }
    .btn-auth:hover { background-color: #155724 !important; transform: translateY(-2px) !important; }

    .login-link { text-align: center; margin-top: 30px; font-size: 1.4rem; color: #555; font-weight: 500; }
    .login-link a { color: var(--primary); font-weight: 700; text-decoration: none; transition: 0.2s; }
    .login-link a:hover { color: var(--primary-dark); text-decoration: underline; }

    /* Disable global placeholders for auth pages */
    #header-placeholder, #footer-placeholder { display: none !important; }
  </style>
</head>
<body id="top">

  <header class="auth-header">
    <a href="index.html" class="logo">कृषिMitra<span>.</span></a>
  </header>

  <main>
    <article>
      <section class="section login-section" aria-label="signup form">
        <div class="container">
          <div class="login-card">
            <h2 class="h2">Farmer Registration</h2>
            <p class="form-subtitle">Create your free Krishimitr account.</p>

            <form action="#" class="signup-form" id="signup-form">
              <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" name="fullname" id="fullname" placeholder="Enter your full name" required>
              </div>
              <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="Enter your email address" required>
              </div>
              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone" placeholder="Enter your 10-digit mobile number" required>
              </div>
              <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" name="password" id="password" placeholder="Create a strong password (min. 6 char)" required>
              </div>

              <hr class="form-divider">

              <div class="form-group">
                <label for="state">State</label>
                <select name="state" id="state" required>
                  <option value="" disabled selected>Select State</option>
                </select>
              </div>
              <div class="form-group">
                <label for="district">District / City</label>
                <select name="district" id="district" required>
                  <option value="" disabled selected>Select State First</option>
                </select>
              </div>
              <div class="form-group">
                <label for="pincode">Pincode</label>
                <input type="text" name="pincode" id="pincode" placeholder="e.g., 302022" maxlength="6" pattern="[0-9]{6}" required>
              </div>
              <div class="form-group">
                <label for="farmsize">Farm Size (in Acres)</label>
                <input type="number" name="farmsize" id="farmsize" placeholder="e.g., 5" required>
              </div>

              <button type="submit" class="btn-auth">Create Account</button>
              <p class="login-link">Already have an account? <a href="index.html">Login here</a></p>
            </form>
          </div>
        </div>
      </section>
    </article>
  </main>

    const stateSelect = document.getElementById('state');
    const districtSelect = document.getElementById('district');

    window.onload = function() {
      const sortedStates = Object.keys(locationData).sort();
      for (let state of sortedStates) {
        let option = document.createElement('option');
        option.value = state;
        option.text = state;
        stateSelect.appendChild(option);
      }
    };

    stateSelect.addEventListener('change', function() {
      districtSelect.innerHTML = '<option value="" disabled selected>Select District</option>';
      const selectedState = this.value;
      const districts = locationData[selectedState];
      if (districts) {
        districts.sort().forEach(function(district) {
          let option = document.createElement('option');
          option.value = district;
          option.text = district;
          districtSelect.appendChild(option);
        });
      }
    });

  <script type="module">
    import { auth, db } from "./assets/js/config.js"; 
    import { createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = 'dashboard.html';
    });

    const signupForm = document.getElementById('signup-form');
    if (signupForm) {
      signupForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const btn = signupForm.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = "Creating Account...";
        btn.disabled = true;

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const farmData = {
          fullName: document.getElementById('fullname').value,
          phone: document.getElementById('phone').value,
          state: document.getElementById('state').value,
          district: document.getElementById('district').value,
          pincode: document.getElementById('pincode').value,
          farmSize: document.getElementById('farmsize').value,
          email: email
        };

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;
          await setDoc(doc(db, "farmers", user.uid), farmData);
          alert('Account created successfully! Redirecting to Dashboard...');
          window.location.href = 'dashboard.html'; 
        } catch (error) {
          let errorMessage = "Error: " + error.message;
          if (error.code === 'auth/email-already-in-use') errorMessage = 'Email already exists. Please login.';
          else if (error.code === 'auth/weak-password') errorMessage = 'Password should be at least 6 characters.';
          alert(errorMessage);
          btn.innerText = originalText;
          btn.disabled = false;
        }
      });
    }
  </script>
