<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>News - कृषिMitra</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    html, body { height: auto !important; overflow-y: auto !important; overflow-x: hidden; background-color: #f9fbfd; }
    .page-banner { padding: 60px 0 80px; text-align: center; background: linear-gradient(to bottom, #f0fdf4, #ffffff); }
    .page-banner .h1 { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 3rem; margin-bottom: 10px; }
    .page-banner .p { font-size: 1.1rem; color: #666; max-width: 600px; margin: 0 auto; line-height: 1.6; }
    .grid-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding-bottom: 80px; }
    .course-card { height: 100%; display: flex; flex-direction: column; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
    .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); border-color: var(--primary-light); }
    .card-banner { height: 200px; overflow: hidden; }
    .img-cover { width: 100%; height: 100%; object-fit: cover; }
    .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 1.3rem; font-weight: 700; color: #333; margin-bottom: 15px; line-height: 1.4; display: -webkit-box; -webkit-lineclamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .btn-read { margin-top: auto; align-self: flex-start; background: #e8f5e9; color: #1e7e34; padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; width: fit-content; }
    .btn-read ion-icon { font-size: 1.2rem !important; } 
    .btn-read:hover { background: #1e7e34; color: white; }
    @media (max-width: 992px) { .page-banner .h1 { font-size: 2.5rem; } }
  </style>
</head>
<body id="top">

  <div id="header-placeholder"></div>

  <main>
    <article>
      <section class="section page-banner">
        <div class="container">
          <h1 class="h1">Global Agri-News</h1>
          <p class="p">Real-time updates on agriculture, markets, and technology from around the world.</p>
        </div>
      </section>

      <section class="section course">
        <div class="container">
          <ul class="grid-list" id="news-container">
             <p style="text-align: center; width: 100%; font-size: 1.2rem; color: #666;">
               <ion-icon name="sync" class="spin"></ion-icon> Loading latest headlines...
             </p>
          </ul>
        </div>
      </section>
    </article>
  </main>

  <div id="footer-placeholder"></div>

  <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn><ion-icon name="chevron-up"></ion-icon></a>

  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/script.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script>
    const API_KEY = "pub_aa53d72288e74dcf9b2d3e7183148e1b"; 
    const mockNews = [
        { title: "Govt announces new MSP rates for Rabi crops 2025", image_url: "./assets/images/courses-4.jpg", link: "#", source_id: "Krishi Jagran", pubDate: "2025-10-15" },
        { title: "New Nano-Urea plant inaugurated in Gujarat to boost yield", image_url: "./assets/images/courses-4.jpg", link: "#", source_id: "Times of India", pubDate: "2025-10-14" },
        { title: "Organic farming adoption rises by 15% in North India", image_url: "./assets/images/courses-4.jpg", link: "#", source_id: "The Hindu", pubDate: "2025-10-12" }
    ];

    async function fetchNews() {
        const container = document.getElementById('news-container');
        const url = `https://newsdata.io/api/1/news?apikey=${API_KEY}&q=agriculture&country=in&language=en`;

        try {
            const response = await fetch(url);
            if (response.status === 401 || response.status === 429) throw new Error("API Limit"); 
            if (!response.ok) throw new Error("Network Error");
            const data = await response.json();
            if (!data.results || data.results.length === 0) throw new Error("No Data");
            renderNews(data.results);
        } catch (error) {
            renderNews(mockNews);
        }
    }

    function renderNews(articles) {
        const container = document.getElementById('news-container');
        container.innerHTML = ""; 

        articles.forEach(article => {
            const image = article.image_url || './assets/images/courses-4.jpg';
            const url = article.link;
            const source = article.source_id;
            const date = article.pubDate ? article.pubDate.split(" ")[0] : "Today";

            const cardHTML = `
            <li>
              <div class="course-card">
                <figure class="card-banner">
                  <img src="${image}" loading="lazy" alt="News" class="img-cover" onerror="this.src='./assets/images/courses-4.jpg'">
                </figure>
                <div class="card-content">
                  <p class="card-author" style="margin-bottom:10px; font-size:0.9rem; color:#666;">
                    <span class="span" style="color:#1e7e34; font-weight:bold; text-transform:capitalize;">${source}</span>
                    <span style="float:right;">${date}</span>
                  </p>
                  <h3 class="h3">
                    <a href="${url}" target="_blank" class="card-title">${article.title}</a>
                  </h3>
                  <a href="${url}" target="_blank" class="btn-read">
                    Read Article <ion-icon name="arrow-forward-outline"></ion-icon>
                  </a>
                </div>
              </div>
            </li>`;
            container.innerHTML += cardHTML;
        });
    }

    document.addEventListener('DOMContentLoaded', fetchNews);
  </script>

  <script type="module">
    import { auth } from "./assets/js/config.js"; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    document.addEventListener('headerLoaded', () => {
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    authContainer.innerHTML = `<a href="dashboard.html" class="nav-profile-btn" title="Go to Dashboard"><ion-icon name="person-circle-outline"></ion-icon></a>`;
                } else {
                    authContainer.innerHTML = `<a href="signup.html" class="btn btn-primary">Sign Up</a>`;
                }
            });
        }
    });
  </script>
</body>
</html>
