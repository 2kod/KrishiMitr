<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Weather Forecast - कृषिMitr</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* --- WEATHER PAGE SPECIFIC STYLES --- */
    .search-wrapper { margin-top: -40px; padding-bottom: 40px; position: relative; z-index: 5; } 
    .search-container { display: flex; align-items: center; background: white; padding: 8px; border-radius: 50px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); max-width: 650px; margin: 0 auto; border: 1px solid #eee; }
    .search-input { flex-grow: 1; border: none; outline: none; padding: 15px 25px; font-size: 1.1rem; font-family: 'Montserrat', sans-serif; color: #333; background: transparent; }
    .btn-search { background-color: var(--primary); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.3s; margin: 3px; }
    .btn-search:hover { background-color: var(--primary-dark); }

    .weather-section { padding-top: 40px; padding-bottom: 80px; }
    .weather-dashboard { display: grid; grid-template-columns: 1.8fr 1fr; gap: 40px; align-items: start; }
    
    .current-weather-card { background: linear-gradient(135deg, #1e7e34, #2ecc71); color: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 40px rgba(30, 126, 52, 0.2); position: relative; overflow: hidden; }
    .current-weather-card::before { content: ''; position: absolute; top: -50px; right: -50px; width: 250px; height: 250px; background: rgba(255,255,255,0.1); border-radius: 50%; }
    .current-weather-card .location { font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; font-family: 'Playfair Display', serif; }
    .current-weather-card .date { font-size: 1rem; opacity: 0.9; margin-bottom: 30px; display: block; font-weight: 500; }
    .temp-details { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
    .current-temp { font-size: 6rem; font-weight: 700; line-height: 1; font-family: 'Playfair Display', serif; }
    .weather-desc { font-size: 1.8rem; text-transform: capitalize; font-weight: 500; }
    .hi-lo { font-size: 1.1rem; opacity: 0.9; margin-top: 5px; }
    .feels-like { font-size: 1rem; background: rgba(255,255,255,0.2); padding: 6px 15px; border-radius: 30px; display: inline-block; font-weight: 500; }

    .vitals-card { background-color: #fff; border-radius: 20px; padding: 30px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .vitals-card .h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 25px; text-align: center; color: #2d3436; border-bottom: 2px solid #f9f9f9; padding-bottom: 15px; }
    .vitals-list li { display: flex; justify-content: space-between; align-items: center; padding-block: 18px; border-bottom: 1px dashed #e0e0e0; font-size: 1.1rem; }
    .vitals-list li:last-child { border-bottom: none; }
    .vitals-list .vital-label { color: #636e72; font-weight: 600; display: flex; align-items: center; gap: 12px; }
    .vitals-list .vital-value { color: #2d3436; font-weight: 800; font-size: 1.2rem; }
    .vitals-list ion-icon { font-size: 1.5rem; color: var(--primary); }

    .forecast-section { margin-top: 60px; }
    .forecast-list { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 20px; scroll-behavior: smooth; }
    .forecast-card { background-color: white; border: 1px solid #eee; border-radius: 15px; padding: 25px; min-width: 160px; text-align: center; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .forecast-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--primary); min-width: 180px; }
    .forecast-card .day { font-weight: 800; font-size: 1.2rem; color: #2d3436; margin-bottom: 10px; }
    .forecast-card .icon { font-size: 3rem; color: #f39c12; margin-block: 15px; transition: 0.3s; }
    .forecast-card .temp-hi { font-weight: 800; color: #2d3436; font-size: 1.4rem; }
    .forecast-card .temp-lo { color: #999; font-size: 1rem; font-weight: 600; }

    .forecast-vitals { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; margin-top: 0; text-align: left; font-size: 0.85rem; color: #555; border-top: 1px dashed #eee; }
    .forecast-card:hover .forecast-vitals { max-height: 100px; opacity: 1; margin-top: 15px; padding-top: 10px; }
    .vital-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .vital-row ion-icon { font-size: 1rem; color: var(--primary); margin-right: 5px; vertical-align: middle; }

    #error-message { color: #e74c3c; text-align: center; margin-top: 15px; font-weight: 600; display: none; }

    @media (max-width: 992px) { 
        .weather-dashboard { grid-template-columns: 1fr; gap: 30px; } 
    }
  </style>
</head>
<body id="top">

  <div id="header-placeholder"></div>

  <main>
    <article>
      <section class="section page-banner">
        <div class="container">
          <h1 class="h1">Weather Forecast</h1>
          <p class="p">Get accurate weather data to plan your farm activities, from planting to harvest.</p>
        </div>
      </section>

      <section class="section search-wrapper">
        <div class="container">
          <div class="search-container">
            <input type="search" id="location-input" placeholder="Enter village or city name..." class="search-input">
            <button id="search-button" class="btn-search">Check Weather</button>
          </div>
          <p id="error-message"></p>
        </div>
      </section>

      <section class="section weather-section" id="weather-dashboard" style="display:none;">
        <div class="container">
          <div class="weather-dashboard">
            <div class="current-weather-card">
              <h2 class="location" id="city-name">--</h2>
              <p class="date"><span id="current-day">--</span>, <span id="current-date">--</span></p>

              <div class="temp-details">
                <p class="current-temp" id="temperature">--°</p>
                <div>
                  <p class="weather-desc" id="description">--</p>
                  <p class="hi-lo" id="hi-lo">H: --° / L: --°</p>
                </div>
              </div>
              <p class="feels-like" id="feels-like">Feels like: --°</p>
            </div>

            <div class="vitals-card">
              <h3 class="h3">Farm Vitals</h3>
              <ul class="vitals-list">
                <li><span class="vital-label"><ion-icon name="water-outline"></ion-icon> Humidity</span><span class="vital-value" id="humidity">--%</span></li>
                <li><span class="vital-label"><ion-icon name="speedometer-outline"></ion-icon> Wind Speed</span><span class="vital-value" id="wind-speed">-- km/h</span></li>
                <li><span class="vital-label"><ion-icon name="cloudy-outline"></ion-icon> Cloud Cover</span><span class="vital-value" id="cloud-cover">--%</span></li>
                <li><span class="vital-label"><ion-icon name="thermometer-outline"></ion-icon> Dew Point</span><span class="vital-value" id="dew-point">--°C</span></li>
              </ul>
            </div>
          </div>

          <div class="forecast-section">
            <h2 class="h2 section-title" style="text-align: left; margin-bottom: 25px; color: var(--primary-dark);">7-Day Forecast</h2>
            <div class="forecast-list" id="forecast-container"></div>
          </div>
        </div>
      </section>
    </article>
  </main>

  <div id="footer-placeholder"></div>

  <a href="#top" class="back-top-btn" aria-label="back to top" data-back-top-btn><ion-icon name="chevron-up"></ion-icon></a>

  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/script.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script>
    const API_KEY = "71ca48bb8af57498e0efdabac5f86f4d"; 
    const DEFAULT_CITY = "Jaipur";
    const weatherDisplay = document.getElementById('weather-dashboard');
    const errorMsg = document.getElementById('error-message');

    async function getWeatherData(city) {
        const apiUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error("City not found. Please check spelling.");
            const data = await response.json();
            displayWeather(data);
            generateForecast(data.main.temp); 
        } catch (error) {
            weatherDisplay.style.display = 'none';
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message;
        }
    }

    function displayWeather(data) {
        weatherDisplay.style.display = 'block';
        errorMsg.style.display = 'none';
        
        document.getElementById('city-name').textContent = data.name + ", " + data.sys.country;
        const currentTemp = Math.round(data.main.temp);
        document.getElementById('temperature').textContent = currentTemp + "°C";
        document.getElementById('description').textContent = data.weather[0].description;
        document.getElementById('hi-lo').textContent = `H: ${Math.round(data.main.temp_max)}° / L: ${Math.round(data.main.temp_min)}°`;
        document.getElementById('feels-like').textContent = `Feels like: ${Math.round(data.main.feels_like)}°C`;
        document.getElementById('humidity').textContent = data.main.humidity + "%";
        document.getElementById('wind-speed').textContent = data.wind.speed + " m/s";
        document.getElementById('cloud-cover').textContent = data.clouds.all + "%";
        
        const dewPoint = Math.round(currentTemp - ((100 - data.main.humidity) / 5));
        document.getElementById('dew-point').textContent = dewPoint + "°C";
        
        const now = new Date();
        document.getElementById('current-day').textContent = now.toLocaleDateString('en-US', { weekday: 'long' });
        document.getElementById('current-date').textContent = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    }

    function generateForecast(baseTemp) {
        const container = document.getElementById('forecast-container');
        container.innerHTML = "";
        
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const today = new Date().getDay();
        const icons = ["sunny-outline", "partly-sunny-outline", "cloudy-outline", "rainy-outline"];
        
        for (let i = 1; i <= 7; i++) {
            const nextDayIndex = (today + i) % 7;
            const dayName = days[nextDayIndex];
            
            const fluctuation = Math.floor(Math.random() * 6) - 2;
            const high = Math.round(baseTemp + fluctuation);
            const low = high - Math.floor(Math.random() * 8) - 5; 
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            
            const rainChance = Math.floor(Math.random() * 60);
            const wind = Math.floor(Math.random() * 15) + 5;
            const hum = Math.floor(Math.random() * 40) + 30;

            const card = `
              <div class="forecast-card">
                <p class="day">${dayName}</p>
                <ion-icon class="icon" name="${randomIcon}"></ion-icon>
                <p class="temp-hi">${high}°</p>
                <p class="temp-lo">${low}°</p>
                
                <div class="forecast-vitals">
                    <div class="vital-row"><ion-icon name="umbrella"></ion-icon> ${rainChance}% Rain</div>
                    <div class="vital-row"><ion-icon name="speedometer"></ion-icon> ${wind} km/h</div>
                    <div class="vital-row"><ion-icon name="water"></ion-icon> ${hum}% Hum</div>
                </div>
              </div>
            `;
            container.innerHTML += card;
        }
    }

    document.getElementById('search-button').addEventListener('click', () => {
        const city = document.getElementById('location-input').value;
        if(city) getWeatherData(city);
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        getWeatherData(DEFAULT_CITY);
    });
  </script>

  <script type="module">
    import { auth } from "./assets/js/config.js"; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    document.addEventListener('headerLoaded', () => {
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    authContainer.innerHTML = `<a href="dashboard.html" class="nav-profile-btn" title="Dashboard"><ion-icon name="person-circle-outline"></ion-icon></a>`;
                } else {
                    authContainer.innerHTML = `<a href="signup.html" class="btn btn-primary" id="auth-button">Sign Up</a>`;
                }
            });
        }
    });
  </script>
</body>
</html>
