<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact Us - कृषिMitra</title>
  <link rel="shortcut icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    .page-banner { padding: 60px 0 80px; text-align: center; background: linear-gradient(to bottom, #f0fdf4, #ffffff); }
    .page-banner .h1 { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 3rem; margin-bottom: 10px; }
    .page-banner .p { font-size: 1.1rem; max-width: 600px; margin: 0 auto; color: #666; line-height: 1.6; }
    .contact-section { background-color: #ffffff; padding-bottom: 100px; }
    .contact-wrapper { display: grid; grid-template-columns: 1.5fr 1fr; gap: 60px; align-items: start; margin-top: -30px; position: relative; z-index: 5; }
    .contact-form-wrapper { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; font-weight: 600; font-size: 1rem; color: #2d3436; margin-bottom: 10px; }
    .form-group input, .form-group textarea { width: 100%; padding: 15px; font-size: 1rem; border: 1px solid #ddd; border-radius: 10px; transition: 0.3s; color: #555; font-family: 'Montserrat', sans-serif; background: #fdfdfd; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 0 0 4px rgba(30, 126, 52, 0.1); }
    .form-group textarea { resize: vertical; min-height: 160px; }
    .contact-details-wrapper { background-color: #f9fbfd; padding: 40px; border-radius: 20px; border: 1px solid #eee; height: 100%; }
    .contact-details-wrapper .h3 { font-size: 1.8rem; font-family: 'Playfair Display', serif; color: #2d3436; margin-bottom: 25px; margin-top: 0; }
    .contact-info-list { list-style: none; margin-bottom: 40px; padding: 0; }
    .contact-info-list li { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 25px; font-size: 1.1rem; color: #555; line-height: 1.5; }
    .contact-info-list ion-icon { font-size: 1.8rem; color: var(--primary); flex-shrink: 0; margin-top: 2px; }
    .map-wrapper { border-radius: 15px; overflow: hidden; height: 300px; background: #e0e0e0; border: 1px solid #ddd; }
    .map-wrapper iframe { display: block; width: 100%; height: 100%; border: 0; }
    @media (max-width: 992px) { 
        .contact-wrapper { grid-template-columns: 1fr; gap: 40px; margin-top: 0; }
        .contact-form-wrapper, .contact-details-wrapper { padding: 25px; }
    }
  </style>
</head>
<body id="top">

  <div id="header-placeholder"></div>

  <main>
    <article>
      <section class="section page-banner">
        <div class="container">
          <h1 class="h1">Contact Us</h1>
          <p class="p">We'd love to hear from you. Reach out with any questions, feedback, or inquiries.</p>
        </div>
      </section>

      <section class="section contact-section">
        <div class="container">
          <div class="contact-wrapper">
            <div class="contact-form-wrapper">
              <h2 class="h2" style="font-family: 'Playfair Display', serif; text-align: left; margin-bottom: 30px; color: var(--primary-dark);">Get in Touch</h2>
              <form id="contact-form" class="contact-form">
                <input type="hidden" name="access_key" value="41bd4f94-f6ff-4ffa-bb0d-6e3da792fb2a"> 
                <div class="form-group">
                  <label for="c-name">Full Name</label>
                  <input type="text" id="c-name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                  <label for="c-email">Email Address</label>
                  <input type="email" id="c-email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                  <label for="c-phone">Phone Number (Optional)</label>
                  <input type="tel" id="c-phone" name="phone" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                  <label for="c-subject">Subject</label>
                  <input type="text" id="c-subject" name="subject" placeholder="What is this regarding?" required>
                </div>
                <div class="form-group">
                  <label for="c-message">Your Message</label>
                  <textarea id="c-message" name="message" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 10px;">Send Message</button>
              </form>
            </div>

            <div class="contact-details-wrapper">
              <h3 class="h3">Contact Details</h3>
              <ul class="contact-info-list">
                <li><ion-icon name="location-outline"></ion-icon><span>Krishimitr HQ, Jaipur, Rajasthan</span></li>
                <li><ion-icon name="call-outline"></ion-icon><span>+91-98765 43210</span></li>
                <li><ion-icon name="mail-outline"></ion-icon><span>contact@krishimitr.in</span></li>
              </ul>
              <h3 class="h3" style="margin-top: 40px;">Our Location</h3>
              <div class="map-wrapper">
                <iframe src="https://maps.google.com/maps?q=Jaipur%20Rajasthan&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
              </div>
            </div>
          </div>
        </div>
      </section>
    </article>
  </main>

  <div id="footer-placeholder"></div>

  <script src="./assets/js/components.js"></script>
  <script src="./assets/js/script.js" defer></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { auth, db } from "./assets/js/config.js"; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    document.addEventListener('headerLoaded', () => {
        const authContainer = document.getElementById('auth-container');
        if (authContainer) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    authContainer.innerHTML = `<a href="dashboard.html" class="nav-profile-btn" title="Dashboard"><ion-icon name="person-circle-outline"></ion-icon></a>`;
                } else {
                    authContainer.innerHTML = `<a href="signup.html" class="btn btn-primary" id="auth-button">Sign Up</a>`;
                }
            });
        }
    });

    const contactForm = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');

    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const originalBtnText = submitBtn.innerText;
        submitBtn.innerText = "Sending...";
        submitBtn.disabled = true;

        const formData = {
            name: document.getElementById('c-name').value,
            email: document.getElementById('c-email').value,
            phone: document.getElementById('c-phone').value,
            subject: document.getElementById('c-subject').value,
            message: document.getElementById('c-message').value
        };

        try {
            await addDoc(collection(db, "contactus"), { ...formData, timestamp: serverTimestamp() });
        } catch (dbError) { 
            console.warn("Firebase save skipped or failed."); 
        }

        try {
            const response = await fetch("https://api.web3forms.com/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json", Accept: "application/json" },
                body: JSON.stringify({ access_key: document.querySelector('input[name="access_key"]').value, ...formData }),
            });
            const result = await response.json();

            if (result.success) {
                alert("Message Sent! We will contact you shortly.");
                contactForm.reset();
            } else {
                alert("Email Service Error: " + result.message);
            }
        } catch (emailError) {
            alert("Connection error. Please check your internet.");
        } finally {
            submitBtn.innerText = originalBtnText;
            submitBtn.disabled = false;
        }
    });
  </script>
</body>
</html>
